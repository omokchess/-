<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FRONTIER — 체스 × 오목</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Cinzel:wght@600;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#2C2C2E; --panel:#3A3A3C; --panel2:#48484A; --border:#555558;
  --gold:#F5C842; --gold2:#E5B832;
  --text:#F2F2F7; --muted:#AEAEB2;
  --red:#FF453A; --green:#30D158; --blue:#0A84FF; --orange:#FF9500;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;overflow-x:hidden}
body{background:radial-gradient(ellipse at top,#3a3a3c 0%,#2c2c2e 50%,#1c1c1e 100%);min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit;outline:none}

.wrap{max-width:1100px;margin:0 auto;padding:24px 20px 60px}

/* 헤더 */
.head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:14px}
.logo{font-family:'Cinzel',serif;font-weight:800;font-size:38px;letter-spacing:6px;color:var(--gold);
  text-shadow:0 2px 0 #8a6c12, 0 4px 18px rgba(245,200,66,.25)}
.tagline{color:var(--muted);font-size:13px;letter-spacing:1px}

/* 프로필 카드 */
.profile{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--panel),var(--panel2));
  padding:10px 14px;border-radius:12px;border:1px solid var(--border)}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--gold);color:#1c1c1e;
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0}
.pinfo{display:flex;flex-direction:column;gap:2px;min-width:0}
.pname{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px}
.pname .edit{background:transparent;color:var(--muted);font-size:12px;padding:0;cursor:pointer}
.pname .edit:hover{color:var(--gold)}
.pelo{font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:center}
.tier{padding:1px 7px;border-radius:8px;font-size:11px;font-weight:700;color:#1c1c1e}

/* 모드 선택 카드 */
.modes{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.mode{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;
  cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:8px;color:var(--text);text-align:left}
.mode:hover{transform:translateY(-2px);border-color:var(--gold);box-shadow:0 6px 22px rgba(245,200,66,.15)}
.mode .icon{font-size:30px}
.mode .mt{font-weight:800;font-size:16px}
.mode .md{font-size:12px;color:var(--muted);line-height:1.5}

/* AI 난이도 모달 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal.show{display:flex}
.modal-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:420px;width:100%}
.modal-card h3{margin-bottom:14px;font-size:18px}
.modal-card .opts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.modal-card .opt{padding:14px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .12s;color:var(--text);text-align:left}
.modal-card .opt:hover{border-color:var(--gold)}
.modal-card .opt b{display:block;font-size:15px;margin-bottom:2px}
.modal-card .opt span{font-size:12px;color:var(--muted)}
.modal-card .actions{display:flex;gap:8px;justify-content:flex-end}

/* 방 목록 */
.section{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.sec-title{font-size:17px;font-weight:800;letter-spacing:.5px}
.sec-title .badge{background:var(--gold);color:#1c1c1e;font-size:11px;padding:2px 8px;border-radius:8px;margin-left:8px}
.tabs{display:flex;gap:6px}
.tab{padding:7px 14px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer}
.tab.on{background:var(--gold);color:#1c1c1e;border-color:var(--gold)}

.room-list{display:flex;flex-direction:column;gap:8px;max-height:380px;overflow-y:auto}
.room-list::-webkit-scrollbar{width:6px}
.room-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px}

.room{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--panel2);
  border:1px solid var(--border);border-radius:10px}
.room .rcode{font-family:'Cinzel',monospace;font-weight:700;color:var(--gold);font-size:14px;
  background:rgba(245,200,66,.1);padding:3px 8px;border-radius:6px;min-width:75px;text-align:center}
.room .rinfo{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.room .rname{font-weight:700;font-size:14px;display:flex;gap:6px;align-items:center}
.room .rname .lock{color:var(--orange);font-size:11px}
.room .rmeta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
.room .rstatus{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:600}
.room .rstatus.wait{background:rgba(48,209,88,.15);color:var(--green)}
.room .rstatus.play{background:rgba(255,149,0,.15);color:var(--orange)}
.room .renter{padding:8px 14px;background:var(--gold);color:#1c1c1e;font-weight:700;font-size:13px;border-radius:8px}
.room .renter.spec{background:var(--panel);color:var(--text);border:1px solid var(--border)}

.btn{padding:10px 16px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;transition:all .12s;border:none;font-family:inherit}
.btn-gold{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1c1c1e}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(245,200,66,.3)}
.btn-ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--panel)}
.btn-blue{background:var(--blue);color:white}
.btn-link{background:transparent;color:var(--muted);font-size:13px;padding:6px 10px;text-decoration:underline}
.btn-link:hover{color:var(--gold)}

/* 입장 모달 */
.enter-form{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.enter-form input{padding:10px 12px;background:var(--panel2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px}
.enter-form input:focus{border-color:var(--gold)}

@media (max-width:780px){
  .modes{grid-template-columns:repeat(2,1fr)}
  .logo{font-size:30px;letter-spacing:4px}
  .wrap{padding:16px 14px 40px}
}
@media (max-width:420px){
  .room{flex-wrap:wrap}
  .room .renter{width:100%;text-align:center;padding:10px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="brand">
      <div class="logo">FRONTIER</div>
      <div class="tagline">체스 × 오목 하이브리드</div>
    </div>
    <div class="profile" id="profile">
      <div class="avatar" id="avatar">?</div>
      <div class="pinfo">
        <div class="pname"><span id="nick">로딩…</span><button class="edit" onclick="changeNick()">✎</button></div>
        <div class="pelo">
          <span id="elo">—</span>
          <span class="tier" id="tier" style="background:#CD7F32">—</span>
          <span id="record">0승 0패</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 모드 선택 -->
  <div class="modes">
    <button class="mode" onclick="goLocal()">
      <div class="icon">👥</div>
      <div class="mt">로컬 2인</div>
      <div class="md">한 기기에서 두 명이 번갈아</div>
    </button>
    <button class="mode" onclick="openAiModal()">
      <div class="icon">🤖</div>
      <div class="mt">AI 대전</div>
      <div class="md">3가지 난이도의 컴퓨터와</div>
    </button>
    <button class="mode" onclick="goCreate()">
      <div class="icon">🌐</div>
      <div class="mt">방 만들기</div>
      <div class="md">온라인으로 친구 초대</div>
    </button>
    <button class="mode" onclick="location.href='ranking.html'">
      <div class="icon">🏆</div>
      <div class="mt">랭킹</div>
      <div class="md">전 세계 ELO 순위</div>
    </button>
  </div>

  <!-- 방 목록 -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-title">온라인 방 <span class="badge" id="rcount">0</span></div>
      <div class="tabs">
        <button class="tab on" data-tab="wait" onclick="setTab('wait')">대기 중</button>
        <button class="tab" data-tab="play" onclick="setTab('play')">진행 중</button>
      </div>
    </div>
    <div class="room-list" id="rooms">
      <div class="empty">로딩 중...</div>
    </div>
  </div>

  <!-- 입장 모달 -->
  <div class="modal" id="enterModal">
    <div class="modal-card">
      <h3 id="enterTitle">방 입장</h3>
      <div class="enter-form">
        <input type="text" id="enterCode" placeholder="방 코드 (6자리)" maxlength="6">
        <input type="password" id="enterPw" placeholder="비밀번호 (있는 경우)">
      </div>
      <div class="actions">
        <button class="btn btn-ghost" onclick="closeEnter()">취소</button>
        <button class="btn btn-gold" onclick="doEnter()">입장</button>
      </div>
    </div>
  </div>

  <!-- AI 난이도 -->
  <div class="modal" id="aiModal">
    <div class="modal-card">
      <h3>AI 난이도 선택</h3>
      <div class="opts">
        <button class="opt" onclick="goAi('easy')"><b>🟢 쉬움</b><span>오목 위주, 빠르게 배우기 좋음</span></button>
        <button class="opt" onclick="goAi('normal')"><b>🟡 보통</b><span>평가 기반, 적당한 도전</span></button>
        <button class="opt" onclick="goAi('hard')"><b>🔴 어려움</b><span>2수 lookahead, 진지한 대국</span></button>
      </div>
      <div class="actions">
        <button class="btn btn-ghost" onclick="closeAi()">취소</button>
      </div>
    </div>
  </div>
</div>

<script>
// ================== Firebase ==================
const FB_CONFIG = {
  apiKey: "AIzaSyB1xN9bp9HsmVmGTHwTIEzKxlbS0RhuwLY",
  authDomain: "ooooomok-285e6.firebaseapp.com",
  databaseURL: "https://ooooomok-285e6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ooooomok-285e6",
  appId: "1:1:web:1"
};
let _fbApp = null, _fbDb = null, _fbAuth = null;
function fbInit(){
  if(_fbApp) return;
  _fbApp = firebase.apps.length ? firebase.app() : firebase.initializeApp(FB_CONFIG);
  _fbDb = firebase.database();
  _fbAuth = firebase.auth();
}
fbInit();

// ================== ELO Tier ==================
function tierOf(elo){
  if(elo<1100) return {name:'브론즈', color:'#CD7F32'};
  if(elo<1250) return {name:'실버', color:'#C0C0C0'};
  if(elo<1400) return {name:'골드', color:'#FFD700'};
  if(elo<1600) return {name:'플래티넘', color:'#30D158'};
  return {name:'다이아몬드', color:'#0A84FF'};
}

// ================== Auth + Profile ==================
let MY_UID = null, MY_NICK = '', MY_ELO = 1200, MY_W=0, MY_L=0, MY_D=0;

_fbAuth.onAuthStateChanged(async user=>{
  if(!user){ try{await _fbAuth.signInAnonymously();}catch(e){console.error(e);} return; }
  MY_UID = user.uid;
  const snap = await _fbDb.ref('users/'+MY_UID).once('value');
  const u = snap.val();
  if(!u || !u.nick){
    let nick = prompt('닉네임을 입력하세요 (12자 이내)','플레이어'+Math.floor(Math.random()*9000+1000));
    if(!nick) nick = '플레이어'+Math.floor(Math.random()*9000+1000);
    nick = nick.slice(0,12);
    MY_NICK = nick; MY_ELO = 1200;
    await _fbDb.ref('users/'+MY_UID).set({nick, elo:1200, w:0, l:0, d:0, t:Date.now()});
    await _fbDb.ref('leaderboard/'+MY_UID).set({nick, elo:1200, w:0, l:0, d:0});
  }else{
    MY_NICK = u.nick || '익명';
    MY_ELO = u.elo || 1200;
    MY_W = u.w || 0; MY_L = u.l || 0; MY_D = u.d || 0;
  }
  renderProfile();
  watchRooms();
});

function renderProfile(){
  document.getElementById('avatar').textContent = MY_NICK.charAt(0).toUpperCase();
  document.getElementById('nick').textContent = MY_NICK;
  document.getElementById('elo').textContent = MY_ELO + ' ELO';
  document.getElementById('record').textContent = `${MY_W}승 ${MY_L}패${MY_D?` ${MY_D}무`:''}`;
  const t = tierOf(MY_ELO);
  const tEl = document.getElementById('tier');
  tEl.textContent = t.name;
  tEl.style.background = t.color;
}

async function changeNick(){
  const cur = MY_NICK;
  let nv = prompt('새 닉네임 (12자 이내)', cur);
  if(!nv) return;
  nv = nv.slice(0,12).trim();
  if(!nv || nv === cur) return;
  MY_NICK = nv;
  await _fbDb.ref('users/'+MY_UID).update({nick:nv});
  await _fbDb.ref('leaderboard/'+MY_UID).update({nick:nv});
  renderProfile();
}

// ================== 방 목록 ==================
let TAB = 'wait';
let ROOMS = {};

function watchRooms(){
  _fbDb.ref('rooms').on('value', snap=>{
    ROOMS = snap.val() || {};
    renderRooms();
  });
}

function setTab(t){
  TAB = t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.tab===t));
  renderRooms();
}

function renderRooms(){
  const list = document.getElementById('rooms');
  const arr = Object.entries(ROOMS).map(([code,r])=>({code,...r}));
  // 24시간 이상 묵은 방은 무시
  const now = Date.now();
  const fresh = arr.filter(r => !r.createdAt || (now-r.createdAt) < 24*3600*1000);
  const filtered = fresh.filter(r => TAB==='wait' ? !r.started : !!r.started);
  // 최신순
  filtered.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  document.getElementById('rcount').textContent = filtered.length;
  if(!filtered.length){
    list.innerHTML = `<div class="empty">${TAB==='wait'?'대기 중인 방이 없습니다. 방 만들기로 시작하세요!':'진행 중인 게임이 없습니다.'}</div>`;
    return;
  }
  list.innerHTML = filtered.map(r=>{
    const isPlay = !!r.started;
    return `
    <div class="room">
      <div class="rcode">${r.code}</div>
      <div class="rinfo">
        <div class="rname">
          ${r.name?escapeHtml(r.name):'(이름 없음)'}
          ${r.password?'<span class="lock">🔒</span>':''}
        </div>
        <div class="rmeta">
          <span>호스트: ${escapeHtml(r.hostNick||'?')}</span>
          ${r.guestNick?`<span>vs ${escapeHtml(r.guestNick)}</span>`:''}
          <span>⏱ ${formatTime(r.timeLimit)}</span>
        </div>
      </div>
      <span class="rstatus ${isPlay?'play':'wait'}">${isPlay?'진행중':'대기중'}</span>
      ${isPlay
        ? `<button class="btn renter spec" onclick="spectate('${r.code}')">👁 관전</button>`
        : `<button class="btn renter" onclick="openEnter('${r.code}', ${r.password?'true':'false'})">입장</button>`}
    </div>`;
  }).join('');
}

function formatTime(s){
  if(!s || s==='unlimited' || s==='0') return '제한없음';
  s = parseInt(s);
  if(s>=3600) return Math.floor(s/3600)+'시간';
  if(s>=60) return Math.floor(s/60)+'분';
  return s+'초';
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}

// ================== 입장 ==================
let _enterCode = null, _enterPwReq = false;
function openEnter(code, pwReq){
  _enterCode = code; _enterPwReq = pwReq;
  document.getElementById('enterTitle').textContent = `방 ${code} 입장`;
  document.getElementById('enterCode').value = code;
  document.getElementById('enterPw').value = '';
  document.getElementById('enterPw').style.display = pwReq?'block':'none';
  document.getElementById('enterModal').classList.add('show');
}
function closeEnter(){ document.getElementById('enterModal').classList.remove('show'); }

async function doEnter(){
  const code = (document.getElementById('enterCode').value || _enterCode || '').trim().toUpperCase();
  if(!code || code.length!==6){ alert('방 코드는 6자리입니다.'); return; }
  const pw = document.getElementById('enterPw').value;
  const snap = await _fbDb.ref('rooms/'+code).once('value');
  const r = snap.val();
  if(!r){ alert('해당 방이 없습니다.'); return; }
  if(r.started){ alert('이미 시작된 방입니다. 관전을 이용하세요.'); return; }
  if(r.password && r.password !== pw){ alert('비밀번호가 틀립니다.'); return; }
  if(r.guestUid && r.guestUid !== MY_UID){ alert('이미 게스트가 입장했습니다.'); return; }
  // 게스트 정보 업데이트
  await _fbDb.ref('rooms/'+code).update({
    guestUid: MY_UID, guestNick: MY_NICK, guestElo: MY_ELO
  });
  const params = new URLSearchParams({
    role:'guest', room:code, time:r.timeLimit||'unlimited',
    uid:MY_UID, nick:MY_NICK, elo:MY_ELO,
    hand:r.hand||'K1Q1R2B2N2P8SH0SN0JP0'
  });
  location.href = 'omokgay.html?'+params.toString();
}

function spectate(code){
  const r = ROOMS[code]; if(!r) return;
  const params = new URLSearchParams({
    role:'spectator', room:code, time:r.timeLimit||'unlimited',
    uid:MY_UID, nick:MY_NICK, elo:MY_ELO,
    hand:r.hand||'K1Q1R2B2N2P8SH0SN0JP0'
  });
  location.href = 'omokgay.html?'+params.toString();
}

// ================== 모드 이동 ==================
function goLocal(){
  location.href = 'omokgay.html?mode=local';
}
function openAiModal(){ document.getElementById('aiModal').classList.add('show'); }
function closeAi(){ document.getElementById('aiModal').classList.remove('show'); }
function goAi(d){
  location.href = 'omokgay.html?mode=ai&difficulty='+d;
}
function goCreate(){
  if(!MY_UID){ alert('로그인 중...'); return; }
  const params = new URLSearchParams({uid:MY_UID, nick:MY_NICK, elo:MY_ELO});
  location.href = 'create-room.html?'+params.toString();
}

// 엔터로 입장
document.getElementById('enterPw').addEventListener('keydown', e=>{ if(e.key==='Enter') doEnter(); });
document.getElementById('enterCode').addEventListener('keydown', e=>{ if(e.key==='Enter') doEnter(); });
</script>
</body>
</html>
