<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>랭킹 — FRONTIER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Cinzel:wght@600;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#2C2C2E; --panel:#3A3A3C; --panel2:#48484A; --border:#555558;
  --gold:#F5C842; --gold2:#E5B832;
  --text:#F2F2F7; --muted:#AEAEB2;
  --red:#FF453A; --green:#30D158; --blue:#0A84FF; --orange:#FF9500;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif}
body{background:radial-gradient(ellipse at top,#3a3a3c 0%,#2c2c2e 50%,#1c1c1e 100%);min-height:100vh}
button{font-family:inherit;cursor:pointer}

.wrap{max-width:780px;margin:0 auto;padding:20px 16px 60px}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.title{display:flex;align-items:baseline;gap:12px}
.logo{font-family:'Cinzel',serif;font-weight:800;font-size:22px;letter-spacing:3px;color:var(--gold)}
.tag{color:var(--muted);font-size:13px}
.back{color:var(--text);text-decoration:none;background:var(--panel2);padding:8px 14px;border-radius:8px;font-size:14px;border:1px solid var(--border)}

.banner{background:linear-gradient(135deg,rgba(245,200,66,.2),rgba(245,200,66,.05));
  border:1px solid var(--gold);border-radius:14px;padding:20px;text-align:center;margin-bottom:18px}
.banner h2{font-family:'Cinzel',serif;font-size:26px;letter-spacing:4px;color:var(--gold);margin-bottom:6px}
.banner p{color:var(--muted);font-size:13px}

.list{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row.me{background:rgba(245,200,66,.1)}
.rank{font-family:'Cinzel',serif;font-size:18px;font-weight:800;width:48px;text-align:center;color:var(--muted)}
.rank.r1{color:#FFD700;font-size:24px}
.rank.r2{color:#C0C0C0;font-size:22px}
.rank.r3{color:#CD7F32;font-size:20px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);color:#1c1c1e;
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;flex-shrink:0}
.uinfo{flex:1;min-width:0}
.uname{font-weight:700;font-size:14px;display:flex;gap:6px;align-items:center}
.urec{font-size:11px;color:var(--muted)}
.uelo{font-weight:800;font-size:16px;color:var(--gold);text-align:right}
.tier{padding:1px 7px;border-radius:8px;font-size:10px;font-weight:700;color:#1c1c1e}

.divider-card{margin:12px 0;background:var(--panel2);border:1px dashed var(--border);
  border-radius:10px;padding:8px;text-align:center;font-size:12px;color:var(--muted)}

.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px}
.skel{display:flex;flex-direction:column;gap:8px;padding:18px}
.skel-row{height:48px;background:var(--panel2);border-radius:8px;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="title">
      <div class="logo">FRONTIER</div>
      <div class="tag">랭킹</div>
    </div>
    <a href="index.html" class="back">← 로비</a>
  </div>

  <div class="banner">
    <h2>LEADERBOARD</h2>
    <p>전 세계 상위 50명 · 실시간 갱신</p>
  </div>

  <div class="list" id="list">
    <div class="skel">
      <div class="skel-row"></div><div class="skel-row"></div><div class="skel-row"></div>
      <div class="skel-row"></div><div class="skel-row"></div>
    </div>
  </div>
  <div id="myRow"></div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyD_bv9vLqcMDMZgGHNLS2A94INXqkO8XX8",
  authDomain: "ooooomok-285e6.firebaseapp.com",
  databaseURL: "https://ooooomok-285e6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ooooomok-285e6",
  storageBucket: "ooooomok-285e6.firebasestorage.app",
  messagingSenderId: "764275385569",
  appId: "1:764275385569:web:44cecc18de9aef4d9a43a0"
};
const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(FB_CONFIG);
const db = firebase.database();
const auth = firebase.auth();

let MY_UID = null;
auth.onAuthStateChanged(async u=>{
  if(!u){ try{await auth.signInAnonymously();}catch(e){} return; }
  MY_UID = u.uid;
  loadLeaderboard();
});

function tierOf(elo){
  if(elo<1100) return {n:'브론즈',c:'#CD7F32'};
  if(elo<1250) return {n:'실버',c:'#C0C0C0'};
  if(elo<1400) return {n:'골드',c:'#FFD700'};
  if(elo<1600) return {n:'플래티넘',c:'#30D158'};
  return {n:'다이아몬드',c:'#0A84FF'};
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}

async function loadLeaderboard(){
  const snap = await db.ref('leaderboard').once('value');
  const obj = snap.val() || {};
  let arr = Object.entries(obj).map(([uid,d])=>({uid,...d}));
  arr.sort((a,b)=>(b.elo||1200)-(a.elo||1200));

  const top = arr.slice(0,50);
  const myIdx = arr.findIndex(x=>x.uid===MY_UID);
  const inTop = myIdx>=0 && myIdx<50;

  const list = document.getElementById('list');
  if(!arr.length){
    list.innerHTML = '<div class="empty">아직 등록된 플레이어가 없습니다.</div>';
    return;
  }

  list.innerHTML = top.map((u,i)=>renderRow(u, i+1, u.uid===MY_UID)).join('');

  if(MY_UID && !inTop && myIdx>=0){
    const me = arr[myIdx];
    document.getElementById('myRow').innerHTML = `
      <div class="divider-card">… 그 외 ${arr.length-50}명 …</div>
      <div class="list">${renderRow(me, myIdx+1, true)}</div>`;
  }
}

function renderRow(u, rank, isMe){
  const t = tierOf(u.elo||1200);
  const rclass = rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
  const medal = rank===1?'👑':rank===2?'🥈':rank===3?'🥉':'';
  return `
  <div class="row ${isMe?'me':''}">
    <div class="rank ${rclass}">${medal||'#'+rank}</div>
    <div class="avatar">${(u.nick||'?').charAt(0).toUpperCase()}</div>
    <div class="uinfo">
      <div class="uname">
        ${escapeHtml(u.nick||'익명')}
        <span class="tier" style="background:${t.c}">${t.n}</span>
        ${isMe?'<span style="color:var(--gold);font-size:11px">YOU</span>':''}
      </div>
      <div class="urec">${u.w||0}승 ${u.l||0}패${u.d?` ${u.d}무`:''}</div>
    </div>
    <div class="uelo">${u.elo||1200}</div>
  </div>`;
}
</script>
</body>
</html>
